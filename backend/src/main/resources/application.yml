spring:
  application:
    name: monitoring-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/monitoring}
    username: ${SPRING_DATASOURCE_USERNAME:monitoring_user}
    password: ${SPRING_DATASOURCE_PASSWORD:monitoring_pass}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

server:
  port: ${PORT:8080}
