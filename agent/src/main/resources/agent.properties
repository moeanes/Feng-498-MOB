# -------------------------------------------------------------------
# Monitoring Agent Configuration
# Fill in machine-id and machine-token after creating the machine
# in the backend dashboard or via the API.
# -------------------------------------------------------------------

# Backend REST base URL (no trailing slash)
agent.backend-url=http://localhost:8080

# UUID of this machine as registered in the backend
agent.machine-id=REPLACE-WITH-YOUR-MACHINE-UUID

# Plain token issued by the backend for this machine
agent.machine-token=REPLACE-WITH-YOUR-MACHINE-TOKEN

# How often (in seconds) to collect and send metrics
agent.interval-seconds=10
